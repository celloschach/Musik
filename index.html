<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musik Spiel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Musik-Quiz</p>
        <h1>Stapel ziehen, Frage beantworten, zurück ins Menü.</h1>
        <p class="subline">Keine doppelte Frage innerhalb eines Levels. Nach jeder Antwort geht es automatisch zurück.</p>
      </div>
      <div class="hero-badge" id="statusBadge">Bereit</div>
    </header>

    <main class="layout">
      <section id="menu" class="panel menu-panel">
        <div class="panel-head">
          <h2>Wähle einen Stapel</h2>
          <p>Jedes Level ist ein eigener Fragenstapel.</p>
        </div>

        <div class="stack-grid">
          <button class="stack-card level-1" onclick="startGame(1)">
            <span class="stack-label">Level 1</span>
            <span class="stack-title">Einstieg</span>
            <span class="stack-meta">Leichte Musikfragen</span>
            <span class="stack-count" id="remaining-1">0 Fragen übrig</span>
          </button>

          <button class="stack-card level-2" onclick="startGame(2)">
            <span class="stack-label">Mittel</span>
            <span class="stack-title">Fortgeschritten</span>
            <span class="stack-meta">Theorie und Wissen</span>
            <span class="stack-count" id="remaining-2">0 Fragen übrig</span>
          </button>

          <button class="stack-card level-3" onclick="startGame(3)">
            <span class="stack-label">Schwer</span>
            <span class="stack-title">Experte</span>
            <span class="stack-meta">Mehr Detailfragen</span>
            <span class="stack-count" id="remaining-3">0 Fragen übrig</span>
          </button>
        </div>

        <div class="menu-footer">
          <button class="reset-button" onclick="resetGame()">Reset</button>
          <p class="hint">Reset setzt alle gezogenen Fragen zurück.</p>
        </div>

        <div id="statusText" class="status-text"></div>
      </section>

      <section id="game" class="panel game-panel hidden">
        <div class="game-topbar">
          <div class="pill" id="levelPill">Level</div>
          <div class="pill ghost" id="progressPill">0 übrig</div>
        </div>

        <div class="question-card">
          <div class="question-mark">?</div>
          <h2 id="question"></h2>
          <p id="questionHint" class="question-hint"></p>
        </div>

        <div id="answers" class="answers"></div>

        <div id="result" class="result-box"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
